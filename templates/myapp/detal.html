<!DOCTYPE html>
<html lang="uz">
<head>
    <title>Foydalanuvchi ma'lumoti</title>
    {% load static %}
</head>
<body>
    <style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#3b4f8f,#2fb3b3);
    text-align:center;
}

h1{
    color:white;
    margin-top:30px;
}

ul{
    display:flex;
    justify-content:center;
    gap:30px;
    list-style:none;
    padding:0;
}

li{
    background:white;
    width:220px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(11, 11, 11, 0.2);
    transition:0.3s;
}


li:hover{
    transform: translateY(-10px);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    background-color: #2a70d1;
}

img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
    margin-top:10px;
    transition:0.3s;
    justify-content: center;
}
    </style>
    <h1>Foydalanuvchi ma'lumotlari</h1>
    <hr>
    {% if user %}
        <p><b>ID:</b> {{ user.id }}</p>
        <p><b>Ismi:</b> {{ user.ism }}</p>
        <p><b>Familiyasi:</b> {{ user.familiya }}</p>
        <p><b>Email:</b> {{ user.email }}</p>
        {% if user.rasm %}
            <p><b>Rasm:</b></p>
            <img src="{{ user.pic.url }}" alt="Foydalanuvchi rasm" width="100" height="100">
        {% else %}
            <img src="{% static 'images/default.jpg' %}" width="100" height="100">
        {% endif %}
    {% else %}
        <p>Ma'lumot topilmadi.</p>
    {% endif %}

    <br>
    <a href="{% url 'user_list' %}">⬅️ Ro'yxatga qaytish</a>
</body>
</html>
