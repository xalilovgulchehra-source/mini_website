<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Ro'yxatdan o'tish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-card { border-radius: 15px; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .btn-register { border-radius: 50px; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card register-card">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4 text-primary">Ro'yxatdan o'tish</h2>
                    
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-muted">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small">{{ field.errors }}</div>
                                {% endif %}
                                {% if field.help_text %}
                                    <div class="text-muted small" style="font-size: 0.7rem;">{{ field.help_text|safe }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-register shadow">Hisob yaratish</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <span class="small text-muted">Akkauntingiz bormi?</span> 
                        <a href="{% url 'login' %}" class="text-decoration-none small fw-bold">Kirish</a>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <a href="/" class="text-muted text-decoration-none small">← Bosh sahifa</a>
            </div>
        </div>
    </div>
</div>

<script>
    var inputs = document.getElementsByTagName('input');
    for (var i = 0; i < inputs.length; i++) {
        if (inputs[i].type !== 'checkbox') {
            inputs[i].classList.add('form-control');
        }
    }
</script>

</body>
</html>
