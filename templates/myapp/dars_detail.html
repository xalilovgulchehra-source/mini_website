{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{{ dars.title }} | Video Dars</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<style>
    /* Umumiy sahifa ko'rinishi */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.video-card {
    background: white;
    width: 100%;
    max-width: 800px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
    padding: 20px;
}

.video-container {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 nisbat */
    height: 0;
    overflow: hidden;
    border-radius: 10px;
    background: #000;
    margin-bottom: 20px;
}

.video-container iframe, 
.video-container video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

.content-section h1 {
    color: #2c3e50;
    margin-bottom: 10px;
}

.description {
    color: #7f8c8d;
    line-height: 1.6;
    font-size: 1.1rem;
}

.back-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background-color: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.back-btn:hover {
    background-color: #2980b9;
}
</style>

    <div class="video-card">
        <div class="video-container">
            {% if video_embed_url %}
                {% if "youtube.com" in video_embed_url %}
                    <iframe src="{{ video_embed_url }}" allowfullscreen></iframe>
                {% else %}
                    <video controls>
                        <source src="{{ video_embed_url }}" type="video/mp4">
                    </video>
                {% endif %}
            {% else %}
                <div style="color: white; text-align: center; padding-top: 20%;">
                    Video yuklanmagan
                </div>
            {% endif %}
        </div>

        <div class="content-section">
         <h1>{{ dars.title }}</h1>
            <p class="description">{{ dars.description }}</p>
            
            <hr>
            
            <a href="/app/darslar/" class="back-btn">← Orqaga qaytish</a>
        </div>
    </div>

</body>
</html>
