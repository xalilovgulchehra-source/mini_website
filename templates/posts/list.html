<h2>Posts</h2>

<a href="{% url 'post_create' %}">Create Post</a>

{% for post in posts %}

    <div class="row">
            <div class="col-md-6 mb-3">
                <div class="card h-100 shadow-sm border-0">
                    {% if post.image %}
                        <img src="{{ post.image.url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title"><a href="{% url 'post_detail'  post.pk %}">{{ post.title }}</a></h5>
                        <p class="card-text text-muted small">{{ post.body|truncatewords:20 }}</p>
                    </div>
                    <div class="card-footer bg-white border-0 text-muted small">
                        Yozildi: {{ post.created_at|date:"d.m.Y" }}
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="col-12 text-center py-5">
                <p class="text-muted">Hozircha postlar yo'q.</p>
            </div>
        {% endfor %}
    </div>
